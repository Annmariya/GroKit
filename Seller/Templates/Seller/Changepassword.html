{% extends 'Seller/Head.html' %}
{% load static %}
{% block content %}
<br><br><br><br>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChangePassword</title>
    <!-- Add Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Back button */
        .back-button {
            position: absolute;
            top: 120px;
            left: 30px;
            z-index: 10;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: #2d3748;
            color: white;
            transform: translateX(-3px);
        }

        .back-link i {
            font-size: 14px;
        }

        /* Main container */
        .password-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;
        }

        /* Elegant card */
        .password-card {
            background: white;
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card header */
        .password-header {
            background: white;
            padding: 30px 30px 20px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .password-header h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .password-header p {
            color: #718096;
            font-size: 14px;
            font-weight: 300;
        }

        .lock-icon {
            font-size: 40px;
            color: #2d3748;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        /* Form container */
        .password-form-container {
            padding: 30px 35px 35px;
        }

        /* Form groups */
        .form-group {
            margin-bottom: 22px;
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        .form-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-label i {
            color: #718096;
            font-size: 14px;
            width: 18px;
        }

        /* Input container */
        .input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-input {
            width: 100%;
            padding: 12px 45px 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #2d3748;
            background: #fafbfc;
            transition: all 0.3s ease;
            outline: none;
        }

        .password-input:focus {
            border-color: #2d3748;
            background: white;
            box-shadow: 0 0 0 3px rgba(45, 55, 72, 0.05);
        }

        .password-input:hover {
            border-color: #cbd5e0;
            background: white;
        }

        .password-input::placeholder {
            color: #a0aec0;
            font-size: 14px;
            font-weight: 300;
        }

        /* Toggle password icon */
        .toggle-password {
            position: absolute;
            right: 15px;
            color: #a0aec0;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: #2d3748;
        }

        /* Password strength indicator */
        .strength-meter {
            margin-top: 10px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            background: #2d3748;
            transition: width 0.3s ease, background 0.3s ease;
        }

        .strength-text {
            font-size: 12px;
            margin-top: 6px;
            text-align: right;
            color: #718096;
        }

        /* Password match indicator */
        .match-indicator {
            font-size: 12px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #718096;
        }

        .match-indicator.match {
            color: #38a169;
        }

        .match-indicator.no-match {
            color: #e53e3e;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 35px;
            animation: fadeIn 0.5s ease 0.4s forwards;
            opacity: 0;
        }

        .btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-primary {
            background: #2d3748;
            color: white;
        }

        .btn-primary:hover {
            background: #1a202c;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: #4a5568;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #f7fafc;
            border-color: #cbd5e0;
            transform: translateY(-2px);
        }

        /* Password requirements */
        .requirements {
            background: #fafbfc;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0 0;
            border: 1px solid #edf2f7;
        }

        .requirements p {
            color: #718096;
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .requirements p i {
            color: #a0aec0;
            font-size: 12px;
        }

        .requirement-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #718096;
            font-size: 12px;
            margin: 6px 0;
        }

        .requirement-item.valid {
            color: #38a169;
        }

        .requirement-item.valid i {
            color: #38a169;
        }

        .requirement-item i {
            width: 16px;
            font-size: 12px;
        }

        /* Card footer */
        .password-footer {
            background: #fafbfc;
            padding: 15px 35px;
            border-top: 1px solid #edf2f7;
            text-align: center;
        }

        .password-footer p {
            color: #a0aec0;
            font-size: 12px;
        }

        .password-footer i {
            color: #667eea;
            margin: 0 3px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .password-form-container {
                padding: 20px;
            }
            
            .password-footer {
                padding: 15px 20px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .back-button {
                top: 100px;
                left: 20px;
            }
            
            .back-link span {
                display: none;
            }
            
            .back-link {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Back Button -->
    <!-- <div class="back-button">
        <a href="" class="back-link">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Profile</span>
        </a>
    </div> -->

    <div class="password-wrapper">
        <div class="password-card">
            <!-- Header -->
            <div class="password-header">
                <div class="lock-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Change Password</h1>
                <p>secure your account with a new password</p>
            </div>

            <!-- Form -->
            <div class="password-form-container">
                <form action="" method="post" id="passwordForm">
                    {% csrf_token %}
                    
                    <!-- Old Password -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-key"></i>
                            Current Password
                        </label>
                        <div class="input-container">
                            <input type="password" name="txt_oldpass" id="oldpass" class="password-input" 
                                   placeholder="Enter current password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('oldpass')"></i>
                        </div>
                    </div>

                    <!-- New Password -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-lock"></i>
                            New Password
                        </label>
                        <div class="input-container">
                            <input type="password" name="txt_newpass" id="newpass" class="password-input" 
                                   placeholder="Enter new password" required onkeyup="checkStrength()">
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('newpass')"></i>
                        </div>
                        <!-- Strength meter -->
                        <div class="strength-meter">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText">Enter a password</div>
                    </div>

                    <!-- Re-type Password -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-check-circle"></i>
                            Confirm Password
                        </label>
                        <div class="input-container">
                            <input type="password" name="txt_retypepass" id="retypepass" class="password-input" 
                                   placeholder="Re-enter new password" required onkeyup="checkMatch()">
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('retypepass')"></i>
                        </div>
                        <div class="match-indicator" id="matchIndicator">
                            <i class="fas fa-info-circle"></i>
                            <span>Re-enter your new password</span>
                        </div>
                    </div>

                    <!-- Password Requirements -->
                    <!-- <div class="requirements">
                        <p><i class="fas fa-shield-alt"></i> Password must contain:</p>
                        <div class="requirement-item" id="req-length">
                            <i class="fas fa-circle"></i> At least 8 characters
                        </div>
                        <div class="requirement-item" id="req-uppercase">
                            <i class="fas fa-circle"></i> One uppercase letter
                        </div>
                        <div class="requirement-item" id="req-lowercase">
                            <i class="fas fa-circle"></i> One lowercase letter
                        </div>
                        <div class="requirement-item" id="req-number">
                            <i class="fas fa-circle"></i> One number
                        </div>
                        <div class="requirement-item" id="req-special">
                            <i class="fas fa-circle"></i> One special character (@$!%*#?)
                        </div>
                    </div> -->

                    <!-- Action Buttons -->
                    <div class="action-buttons">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="fas fa-save"></i>
                            Change Password
                        </button>
                        <button type="reset" class="btn btn-secondary" onclick="resetForm()">
                            <i class="fas fa-times"></i>
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- Footer -->
            <div class="password-footer">
                <p>
                    <i class="fas fa-shield-alt"></i> 
                    password encrypted 
                    <i class="fas fa-circle" style="font-size: 4px; margin: 0 5px;"></i>
                    secure connection
                </p>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Password strength checker
        function checkStrength() {
            const password = document.getElementById('newpass').value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            let strength = 0;
            
            // Length check
            if (password.length >= 8) strength += 25;
            
            // Uppercase check
            if (/[A-Z]/.test(password)) strength += 25;
            
            // Lowercase check
            if (/[a-z]/.test(password)) strength += 20;
            
            // Number check
            if (/[0-9]/.test(password)) strength += 15;
            
            // Special character check
            if (/[@$!%*#?&]/.test(password)) strength += 15;
            
            // Update bar
            strengthBar.style.width = strength + '%';
            
            // Update color and text
            if (strength < 30) {
                strengthBar.style.background = '#e53e3e';
                strengthText.textContent = 'Weak password';
                strengthText.style.color = '#e53e3e';
            } else if (strength < 60) {
                strengthBar.style.background = '#d69e2e';
                strengthText.textContent = 'Medium password';
                strengthText.style.color = '#d69e2e';
            } else if (strength < 85) {
                strengthBar.style.background = '#38a169';
                strengthText.textContent = 'Strong password';
                strengthText.style.color = '#38a169';
            } else {
                strengthBar.style.background = '#2d3748';
                strengthText.textContent = 'Very strong password';
                strengthText.style.color = '#2d3748';
            }
            
            // Update requirements
            updateRequirements(password);
        }

        // Update requirements list
        function updateRequirements(password) {
            // Length
            const reqLength = document.getElementById('req-length');
            if (password.length >= 8) {
                reqLength.classList.add('valid');
                reqLength.innerHTML = '<i class="fas fa-check-circle"></i> At least 8 characters ✓';
            } else {
                reqLength.classList.remove('valid');
                reqLength.innerHTML = '<i class="fas fa-circle"></i> At least 8 characters';
            }
            
            // Uppercase
            const reqUppercase = document.getElementById('req-uppercase');
            if (/[A-Z]/.test(password)) {
                reqUppercase.classList.add('valid');
                reqUppercase.innerHTML = '<i class="fas fa-check-circle"></i> One uppercase letter ✓';
            } else {
                reqUppercase.classList.remove('valid');
                reqUppercase.innerHTML = '<i class="fas fa-circle"></i> One uppercase letter';
            }
            
            // Lowercase
            const reqLowercase = document.getElementById('req-lowercase');
            if (/[a-z]/.test(password)) {
                reqLowercase.classList.add('valid');
                reqLowercase.innerHTML = '<i class="fas fa-check-circle"></i> One lowercase letter ✓';
            } else {
                reqLowercase.classList.remove('valid');
                reqLowercase.innerHTML = '<i class="fas fa-circle"></i> One lowercase letter';
            }
            
            // Number
            const reqNumber = document.getElementById('req-number');
            if (/[0-9]/.test(password)) {
                reqNumber.classList.add('valid');
                reqNumber.innerHTML = '<i class="fas fa-check-circle"></i> One number ✓';
            } else {
                reqNumber.classList.remove('valid');
                reqNumber.innerHTML = '<i class="fas fa-circle"></i> One number';
            }
            
            // Special character
            const reqSpecial = document.getElementById('req-special');
            if (/[@$!%*#?&]/.test(password)) {
                reqSpecial.classList.add('valid');
                reqSpecial.innerHTML = '<i class="fas fa-check-circle"></i> One special character ✓';
            } else {
                reqSpecial.classList.remove('valid');
                reqSpecial.innerHTML = '<i class="fas fa-circle"></i> One special character (@$!%*#?)';
            }
        }

        // Check password match
        function checkMatch() {
            const newPass = document.getElementById('newpass').value;
            const retypePass = document.getElementById('retypepass').value;
            const matchIndicator = document.getElementById('matchIndicator');
            
            if (retypePass.length === 0) {
                matchIndicator.innerHTML = '<i class="fas fa-info-circle"></i> <span>Re-enter your new password</span>';
                matchIndicator.className = 'match-indicator';
            } else if (newPass === retypePass) {
                matchIndicator.innerHTML = '<i class="fas fa-check-circle"></i> <span>Passwords match ✓</span>';
                matchIndicator.className = 'match-indicator match';
            } else {
                matchIndicator.innerHTML = '<i class="fas fa-times-circle"></i> <span>Passwords do not match</span>';
                matchIndicator.className = 'match-indicator no-match';
            }
        }

        // Reset form
        function resetForm() {
            document.getElementById('oldpass').value = '';
            document.getElementById('newpass').value = '';
            document.getElementById('retypepass').value = '';
            
            // Reset strength
            document.getElementById('strengthBar').style.width = '0%';
            document.getElementById('strengthText').textContent = 'Enter a password';
            document.getElementById('strengthText').style.color = '#718096';
            
            // Reset match
            document.getElementById('matchIndicator').innerHTML = '<i class="fas fa-info-circle"></i> <span>Re-enter your new password</span>';
            document.getElementById('matchIndicator').className = 'match-indicator';
            
            // Reset requirements
            const requirements = ['length', 'uppercase', 'lowercase', 'number', 'special'];
            requirements.forEach(req => {
                const element = document.getElementById(`req-${req}`);
                element.classList.remove('valid');
                if (req === 'length') element.innerHTML = '<i class="fas fa-circle"></i> At least 8 characters';
                if (req === 'uppercase') element.innerHTML = '<i class="fas fa-circle"></i> One uppercase letter';
                if (req === 'lowercase') element.innerHTML = '<i class="fas fa-circle"></i> One lowercase letter';
                if (req === 'number') element.innerHTML = '<i class="fas fa-circle"></i> One number';
                if (req === 'special') element.innerHTML = '<i class="fas fa-circle"></i> One special character (@$!%*#?)';
            });
        }

        // Form validation
        document.getElementById('passwordForm').addEventListener('submit', function(e) {
            const newPass = document.getElementById('newpass').value;
            const retypePass = document.getElementById('retypepass').value;
            
            if (newPass !== retypePass) {
                e.preventDefault();
                alert('New password and confirm password do not match!');
            }
        });
    </script>
</body>
</html>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Seller:Myprofile' %}"
</script>
{% endif %}

{% endblock content %}
