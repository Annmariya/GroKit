{% extends 'Seller/Head.html' %}
{% load static %}
{% block content %}
<br><br><br><br>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editprofile</title>
    <!-- Add Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Main container */
        .edit-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;
        }

        /* Back button */
        .back-button {
            position: absolute;
            top: 120px;
            left: 30px;
            z-index: 10;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: #2d3748;
            color: white;
            transform: translateX(-3px);
        }

        .back-link i {
            font-size: 14px;
        }

        /* Elegant card */
        .edit-card {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            position: relative;
        }

        /* Card header */
        .edit-header {
            background: white;
            padding: 30px 30px 20px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .edit-header h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .edit-header p {
            color: #718096;
            font-size: 14px;
            font-weight: 300;
        }

        /* Form container */
        .edit-form-container {
            padding: 30px 35px 35px;
        }

        /* Form groups */
        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-label i {
            color: #718096;
            font-size: 14px;
            width: 18px;
        }

        /* Stylish inputs */
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #2d3748;
            background: #fafbfc;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #2d3748;
            background: white;
            box-shadow: 0 0 0 3px rgba(45, 55, 72, 0.05);
        }

        .form-input:hover {
            border-color: #cbd5e0;
            background: white;
        }

        /* Input with icon */
        .input-with-icon {
            position: relative;
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 14px;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }

        .btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-update {
            background: #2d3748;
            color: white;
        }

        .btn-update:hover {
            background: #1a202c;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #970f3e;
            color: #f8faff;
            border: 1px solid #e2e8f0;
        }

        .btn-cancel:hover {
            background: #970f3e;
            border-color: #080808;
            transform: translateY(-2px);
        }

        /* Card footer */
        .edit-footer {
            background: #fafbfc;
            padding: 15px 35px;
            border-top: 1px solid #edf2f7;
            text-align: center;
        }

        .edit-footer p {
            color: #a0aec0;
            font-size: 12px;
        }

        .edit-footer i {
            color: #667eea;
            margin: 0 3px;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .edit-card {
            animation: fadeIn 0.5s ease forwards;
        }

        .form-group {
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        /* Responsive */
        @media (max-width: 600px) {
            .edit-form-container {
                padding: 20px;
            }
            
            .edit-footer {
                padding: 15px 20px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .back-button {
                top: 100px;
                left: 20px;
            }
            
            .back-link span {
                display: none;
            }
            
            .back-link {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Back Button -->
    <!-- <div class="back-button">
        <a href="" class="back-link">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Profile</span>
        </a>
    </div> -->

    <div class="edit-wrapper">
        <div class="edit-card">
            <!-- Header -->
            <div class="edit-header">
                <h1>Edit Profile</h1>
                <p>update your information</p>
            </div>

            <!-- Form -->
            <div class="edit-form-container">
                <form action="" method="post">
                    {% csrf_token %}
                    
                    <!-- Name Field -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user"></i>
                            Full Name
                        </label>
                        <div class="input-with-icon">
                            <input type="text" name="txt_name" class="form-input" value="{{sellerdata.seller_name}}" placeholder="Enter your name" required>
                            <i class="fas fa-pencil-alt input-icon"></i>
                        </div>
                    </div>

                    <!-- Email Field -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>
                        <div class="input-with-icon">
                            <input type="email" name="txt_email" class="form-input" value="{{sellerdata.seller_email}}" placeholder="Enter your email" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>

                    <!-- Contact Field -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-phone-alt"></i>
                            Phone Number
                        </label>
                        <div class="input-with-icon">
                            <input type="text" name="txt_contact" class="form-input" value="{{sellerdata.seller_contact}}" placeholder="Enter your contact" required>
                            <i class="fas fa-phone input-icon"></i>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="action-buttons">
                        <button type="submit" class="btn btn-update">
                            <i class="fas fa-save"></i>
                            Update
                        </button>
                        <!-- <button type="reset" class="btn btn-cancel">
                            <i class="fas fa-times"></i>
                            Cancel
                        </button> -->
                    </div>
                </form>
            </div>

            <!-- Footer -->
            <div class="edit-footer">
                <p>
                    <i class="fas fa-shield-alt"></i> 
                    your information is secure 
                    <i class="fas fa-circle" style="font-size: 4px; margin: 0 5px;"></i>
                    encrypted
                </p>
            </div>
        </div>
    </div>
</body>
</html>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Seller:Myprofile' %}"
</script>
{% endif %}

{% endblock content %}
